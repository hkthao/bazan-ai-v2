services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: bazan-open-webui
    ports:
      - "${WEBUI_PORT:-3000}:8080"
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-change-this-in-production}
      - ENABLE_SIGNUP=${ENABLE_SIGNUP:-true}
      - VECTOR_DB=qdrant
      - QDRANT_URI=http://qdrant:6333
    volumes:
      - webui_data:/app/backend/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      qdrant:
        condition: service_healthy
    restart: always

  # pipelines:
  #   build:
  #     context: ../services/pipelines
  #   container_name: bazan-pipelines
  #   ports:
  #     - "9099:9099"
  #   environment:
  #     - RAG_API_URL=http://rag-api:8001
  #   env_file:
  #     - ../.env
  #   depends_on:
  #     - rag-api
  #   restart: unless-stopped

  # rag-api:
  #   build:
  #     context: ../services/rag-api
  #   container_name: bazan-rag-api
  #   ports:
  #     - "8001:8001"
  #   env_file:
  #     - ../services/rag-api/.env
  #   depends_on:
  #     - qdrant
  #   restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: bazan-qdrant
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<> /dev/tcp/127.0.0.1/6333; exec 3>&-"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  kokoro-tts:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
    container_name: bazan-kokoro-tts
    ports:
      - "${KOKORO_PORT:-8880}:8880"
    volumes:
      - kokoro_models:/app/models
    environment:
      # Tiếng Việt đang trong lộ trình Kokoro.
      # Khi có: thay DEFAULT_VOICE thành voice tiếng Việt, không cần sửa gì khác.
      # Theo dõi: https://github.com/hexgrad/kokoro
      - DEFAULT_VOICE=${KOKORO_DEFAULT_VOICE:-af_heart}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8880/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # data-collector:
  #   build:
  #     context: ../services/data-collector
  #   container_name: bazan-data-collector
  #   env_file:
  #     - ../.env
  #   depends_on:
  #     - qdrant
  #   restart: unless-stopped

  mongodb:
    image: mongo:latest
    container_name: bazan-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-express:
    image: mongo-express:latest
    container_name: bazan-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongodb
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=bazan-admin
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  webui_data:
    name: bazan-webui-data
  qdrant_data:
    name: bazan-qdrant-data
  kokoro_models:
    name: bazan-kokoro-models
  mongodb_data:
    name: bazan-mongodb-data

networks:
  default:
    name: bazan-network
