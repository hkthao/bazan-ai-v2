  #   depends_on:
  #     - qdrant
  #   restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: bazan-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # data-collector:
